    <h1 class="bluetitle">Send Us A Resource</h1>

    <img id="sendusatipgraphic" src="assets/foodpantrygroceriesbasketgraphic.png" alt="illustration of a box of produce">




    <form action="https://sheetdb.io/api/v1/3jhh32l6lvfvs" method="post">
      <!-- <form> -->

      <div>
        <label for="name" class="sendusatipinputtitles">Your Name</label>
        <br>
        <input type="name" class="tipinputfield" name="name" id="name">
      </div>

      <br>

      <div>
        <label for="communityresourceyoufound" class="sendusatipinputtitles">Community Resource You Found</label>
        <br>
        <select class="tipinputfield" name="communityresourceyoufound" id="communityresourceyoufound" required>
          <option value="">Select a resource</option>
          <option value="food-pantry">Food Pantry</option>
          <option value="soup-kitchen">Soup Kitchen</option>
          <option value="community-fridge">Community Fridge</option>
          <option value="Mutual Aid">Mutual Aid</option>
          <option value="other">Other</option>
        </select>
      </div>

      <br>

      <div>
        <label for="location" class="sendusatipinputtitles">Location (Address)</label>
        <br>
        <input type="location" class="tipinputfield" name="location" id="location" required>
      </div>

      <br>

      <div>
        <label for="date" class="sendusatipinputtitles">Start Date (If Applicable)</label>
        <br>
        <input type="date" class="tipinputfield" name="date" id="date">
      </div>

<br>

<div>
        <label for="date" class="sendusatipinputtitles">End Date (If Applicable)</label>
        <br>
        <input type="date" class="tipinputfield" name="date" id="enddate">
      </div>

<br>

      <div>

        
        <label for="description" class="sendusatipinputtitles">Description/Additional Details</label>
        <br>
        <textarea id="description" name="description" class="tipinputfield"></textarea> 
       
      </div>

<div>
  <input type="submit">
</div>



    </form>
